env: "local"
storage_path: "./storage/fts-queue.db"
dump_path: "./data/enwiki-latest-abstract1.xml.gz"
fts:
  engine: "trie"
  index: "radix"
  keygen: "word"
  pipeline:
    lowercase: true
    stopwords_en: true
    stopwords_ru: false
    stem_en: true
    stem_ru: false
    min_length: 3
mode:
  type: "prod"
