env: "local"
storage_path: "./storage/fts-queue.db"
dump_path: "./data/enwiki-latest-abstract1.xml.gz"
fts:
  engine: "trie"
  index: "radix"
  keygen: "word"
  filter: "none"
  bloom:
    expected_items: 1000000
    bits_per_item: 10
    k: 7
  cuckoo:
    bucket_count: 262144
    bucket_size: 4
    max_kicks: 500
  pipeline:
    lowercase: true
    stopwords_en: true
    stopwords_ru: false
    stem_en: true
    stem_ru: false
    min_length: 3
mode:
  type: "prod"
