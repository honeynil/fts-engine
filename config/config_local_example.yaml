env: "local"
storage_path: "./storage/leveldb.db"
dump_path: "./data/enwiki-latest-abstract1.xml.gz"
fts:
  engine: "trie"
  index: "slicedradix" # radix|slicedradix|trigram|hamt|hamtpointered
  keygen: "word"
  filter: "ribbon"
  snapshot:
    enabled: true
    path: "./data/segments/local.fidx"
    index_path: "./data/segments/local.index.fidx"
    filter_path: "./data/segments/local.filter.fidx"
    load_on_start: false
    save_on_build: true
    buffer_size: 1048576
    flush_threshold: 262144
    sync_file: true
  bloom:
    expected_items: 1000000
    bits_per_item: 20
    k: 14
  cuckoo:
    bucket_count: 327680
    bucket_size: 4
    max_kicks: 500
  ribbon:
    expected_items: 1000000
    extra_cells: 250000
    window_size: 16
    seed: 0
    max_attempts: 50
  pipeline:
    lowercase: true
    stopwords_en: true
    stopwords_ru: false
    stem_en: true
    stem_ru: false
    min_length: 3
mode:
  type: "prod"
