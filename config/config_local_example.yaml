env: "local"
storage_path: "./storage/fts-queue.db"
dump_path: "./data/enwiki-latest-abstract1.xml.gz"
fts:
  engine: "trie"
  index: "radix"
  keygen: "word"
  filter: "none"
  bloom:
    expected_items: 1000000
    bits_per_item: 10
    k: 7
  pipeline:
    lowercase: true
    stopwords_en: true
    stem_en: true
    min_length: 3
mode:
  type: "prod"
